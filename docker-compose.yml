services:
  f-server:
    build: .
    image: localhost/f-server:latest
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio
      - minio-init
    volumes:
      - fserver-keystore:/var/lib/f-server/keystore

  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: fserver
      POSTGRES_USER: fserver
      POSTGRES_PASSWORD: fserver
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/f-server;
      "

  # Minimal single-container variant:
  # f-server-local:
  #   build: .
  #   profiles: ["local"]
  #   environment:
  #     FS_DATABASE_URL: sqlite:////data/f-server.db
  #     FS_STORAGE__BACKEND: local
  #     FS_STORAGE__LOCAL_PATH: /data/storage
  #     FS_REPO__URL: http://localhost:8000/repo
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - fserver-local-data:/data

volumes:
  postgres-data:
  minio-data:
  fserver-keystore:
  fserver-local-data:
